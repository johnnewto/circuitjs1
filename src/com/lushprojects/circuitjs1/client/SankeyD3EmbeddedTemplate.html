<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sankey Diagram (D3) - __TITLE__</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: white; }
    #sankey-chart { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
    .node rect { fill-opacity: 0.9; shape-rendering: crispEdges; }
    .node text { font-size: 11px; pointer-events: none; }
    .link { fill: none; stroke-opacity: 0.4; }
    .link:hover { stroke-opacity: 0.7; }
    .tooltip { position: absolute; background: rgba(0,0,0,0.8); color: white; padding: 8px 12px; border-radius: 4px; font-size: 12px; pointer-events: none; z-index: 1000; }
  </style>
</head>
<body>
  <div id="sankey-chart"></div>
  <script>
    const d3RawData = __SANKEY_JSON__;

    const d3Nodes = d3RawData.nodeLabels.map((name, i) => ({
      name: name,
      color: d3RawData.nodeColors[i]
    }));

    const d3Links = d3RawData.linkSources.map((source, i) => ({
      source: source,
      target: d3RawData.linkTargets[i],
      value: Math.max(0.001, d3RawData.linkValues[i] || 0),
      color: d3RawData.linkColors[i],
      label: d3RawData.linkLabels[i]
    })).filter(l => l.value > 0 && !isNaN(l.value) && isFinite(l.value));

    if (d3Links.length === 0) {
      document.getElementById('sankey-chart').innerHTML = '<p style="text-align:center;color:#666;padding:50px;">No flow data yet. Run simulation to see flows.</p>';
    } else {

    const d3Data = { nodes: d3Nodes, links: d3Links };

    const container = document.getElementById('sankey-chart');
    const width = container.clientWidth || 800;
    const height = container.clientHeight || 450;
    const margin = { top: 10, right: 10, bottom: 10, left: 10 };

    const svg = d3.select('#sankey-chart')
      .append('svg')
      .attr('width', width)
      .attr('height', height)
      .attr('id', 'sankey-svg');

    const sankey = d3.sankey()
      .nodeWidth(20)
      .nodePadding(15)
      .extent([[margin.left, margin.top], [width - margin.right, height - margin.bottom]]);

    const { nodes: sankeyNodes, links: sankeyLinks } = sankey({
      nodes: d3Data.nodes.map(d => Object.assign({}, d)),
      links: d3Data.links.map(d => Object.assign({}, d))
    });

    const defs = svg.append('defs');
    sankeyLinks.forEach((link, i) => {
      const gradient = defs.append('linearGradient')
        .attr('id', 'gradient-' + i)
        .attr('gradientUnits', 'userSpaceOnUse')
        .attr('x1', link.source.x1)
        .attr('x2', link.target.x0);
      gradient.append('stop')
        .attr('offset', '0%')
        .attr('stop-color', link.source.color);
      gradient.append('stop')
        .attr('offset', '100%')
        .attr('stop-color', link.target.color);
    });

    const tooltip = d3.select('body').append('div')
      .attr('class', 'tooltip')
      .style('opacity', 0);

    svg.append('g')
      .attr('class', 'links')
      .selectAll('.link')
      .data(sankeyLinks)
      .enter()
      .append('path')
      .attr('class', 'link')
      .attr('d', d3.sankeyLinkHorizontal())
      .attr('stroke', (d, i) => 'url(#gradient-' + i + ')')
      .attr('stroke-width', d => Math.max(1, d.width))
      .on('mouseover', function(event, d) {
        window.hoveredLinkIndex = Array.from(svg.selectAll('.link').nodes()).indexOf(this);
        d3.select(this).style('stroke-opacity', 0.7);
        tooltip.transition().duration(200).style('opacity', 0.9);
        tooltip.html(d.label)
          .style('left', (event.pageX + 10) + 'px')
          .style('top', (event.pageY - 10) + 'px');
      })
      .on('mousemove', function(event) {
        tooltip.style('left', (event.pageX + 10) + 'px')
          .style('top', (event.pageY - 10) + 'px');
      })
      .on('mouseout', function() {
        window.hoveredLinkIndex = -1;
        d3.select(this).style('stroke-opacity', 0.4);
        tooltip.transition().duration(500).style('opacity', 0);
      });

    window.hoveredLinkIndex = -1;

    const node = svg.append('g')
      .attr('class', 'nodes')
      .selectAll('.node')
      .data(sankeyNodes)
      .enter()
      .append('g')
      .attr('class', 'node');

    node.append('rect')
      .attr('x', d => d.x0)
      .attr('y', d => d.y0)
      .attr('height', d => d.y1 - d.y0)
      .attr('width', d => d.x1 - d.x0)
      .attr('fill', d => d.color)
      .attr('stroke', '#000');

    node.append('text')
      .attr('x', d => d.x0 < width / 2 ? d.x1 + 6 : d.x0 - 6)
      .attr('y', d => (d.y1 + d.y0) / 2)
      .attr('dy', '0.35em')
      .attr('text-anchor', d => d.x0 < width / 2 ? 'start' : 'end')
      .text(d => d.name);

    window.updateD3Sankey = function(newData) {
      const newNodes = newData.nodeLabels.map((name, i) => ({
        name: name,
        color: newData.nodeColors[i]
      }));
      const newLinks = newData.linkSources.map((source, i) => ({
        source: source,
        target: newData.linkTargets[i],
        value: Math.max(0.001, newData.linkValues[i] || 0),
        color: newData.linkColors[i],
        label: newData.linkLabels[i]
      })).filter(l => l.value > 0 && !isNaN(l.value) && isFinite(l.value));

      if (newLinks.length === 0) return;

      try {
        const newSankeyData = sankey({
          nodes: newNodes.map(d => Object.assign({}, d)),
          links: newLinks.map(d => Object.assign({}, d))
        });

        newSankeyData.links.forEach((link, i) => {
          const gradient = svg.select('defs').select('#gradient-' + i);
          if (!gradient.empty()) {
            gradient.attr('x1', link.source.x1).attr('x2', link.target.x0);
            gradient.select('stop:first-child').attr('stop-color', link.source.color);
            gradient.select('stop:last-child').attr('stop-color', link.target.color);
          }
        });

        const linkSelection = svg.selectAll('.link').data(newSankeyData.links);
        linkSelection
          .transition()
          .duration(300)
          .attr('d', d3.sankeyLinkHorizontal())
          .attr('stroke-width', d => Math.max(1, d.width));

        if (window.hoveredLinkIndex >= 0 && window.hoveredLinkIndex < newSankeyData.links.length) {
          const hoveredLink = newSankeyData.links[window.hoveredLinkIndex];
          tooltip.html(hoveredLink.label);
        }

        const nodeGroups = svg.selectAll('.node').data(newSankeyData.nodes);
        nodeGroups.select('rect')
          .transition()
          .duration(300)
          .attr('y', d => d.y0)
          .attr('height', d => d.y1 - d.y0);
        nodeGroups.select('text')
          .transition()
          .duration(300)
          .attr('y', d => (d.y1 + d.y0) / 2);
      } catch(e) {
      }
    };
    }
  </script>
</body>
</html>
