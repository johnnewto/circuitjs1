function formatMathLabel(text){

    Alpha:'Α',Beta:'Β',Gamma:'Γ',Delta:'Δ',Epsilon:'Ε',Zeta:'Ζ',Eta:'Η',Theta:'Θ',Iota:'Ι',Kappa:'Κ',Lambda:'Λ',Mu:'Μ',Nu:'Ν',Xi:'Ξ',Omicron:'Ο',Pi:'Π',Rho:'Ρ',Sigma:'Σ',Tau:'Τ',Upsilon:'Υ',Phi:'Φ',Chi:'Χ',Psi:'Ψ',Omega:'Ω',
    degree:'°',pm:'±',times:'×',div:'÷',infty:'∞',sqrt:'√',approx:'≈',neq:'≠',leq:'≤',geq:'≥'
  };

    '0':'₀','1':'₁','2':'₂','3':'₃','4':'₄','5':'₅','6':'₆','7':'₇','8':'₈','9':'₉','+':'₊','-':'₋','=':'₌','(':'₍',')':'₎',
    'a':'ₐ','e':'ₑ','h':'ₕ','i':'ᵢ','j':'ⱼ','k':'ₖ','l':'ₗ','m':'ₘ','n':'ₙ','o':'ₒ','p':'ₚ','r':'ᵣ','s':'ₛ','t':'ₜ','u':'ᵤ','v':'ᵥ','x':'ₓ'

    '0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹','+':'⁺','-':'⁻','=':'⁼','(':'⁽',')':'⁾',

  };

  }

function compactLabel(s){if(!s) return ''; return s.length>22 ? s.substring(0,21)+'…' : s;}
function circularDistance(a,b,size){const d=Math.abs(a-b);return Math.min(d,size-d);}
function buildLoopGraphInfo(g){
  const info={outEdges:[],inDegree:new Array(g.nodes.length),outDegree:new Array(g.nodes.length),historicalIncident:new Array(g.nodes.length),lastIncident:new Array(g.nodes.length)};

    info.outDegree[i]=0;
    info.historicalIncident[i]=false;
    info.lastIncident[i]=false;
  }
  for(let i=0;i<g.edges.length;i++){
    const e=g.edges[i];
    const edge={from:e.from,to:e.to,historical:!!e.historical,lastDependency:!!e.lastDependency};
    if(edge.from < 0 || edge.from >= g.nodes.length || edge.to < 0 || edge.to >= g.nodes.length) continue;
    info.outEdges[edge.from].push(edge);
    info.outDegree[edge.from]++;
    info.inDegree[edge.to]++;
    if(edge.historical){ info.historicalIncident[edge.from]=true; info.historicalIncident[edge.to]=true; }
    if(edge.lastDependency){ info.lastIncident[edge.from]=true; info.lastIncident[edge.to]=true; }
  }
  info.nodeScore = new Array(g.nodes.length);
  for(let i=0;i<g.nodes.length;i++){
    const n=g.nodes[i];
    info.nodeScore[i]=info.inDegree[i]+info.outDegree[i]+(info.lastIncident[i]?5:0)+(info.historicalIncident[i]?2:0)+(n && !n.stock ? 2 : -2);
  }

function scoreLoop(g, info, loopNodes, loopEdges){
  const histCount=loopEdges.filter(function(e){ return e.historical; }).length;
  const lastCount=loopEdges.filter(function(e){ return e.lastDependency; }).length;
  const nonStockCount=loopNodes.filter(function(idx){ return !g.nodes[idx].stock; }).length;
  const uniqueBlocks=new Set(loopNodes.map(function(idx){ return g.nodes[idx].block; })).size;
  let degreeSum=0;
  for(let i=0;i<loopNodes.length;i++) degreeSum += info.nodeScore[loopNodes[i]];
  let boundaryCount=0;
  for(let i=0;i<loopNodes.length;i++){
    const prev=loopNodes[(i-1+loopNodes.length)%loopNodes.length];
    const cur=loopNodes[i];
    const next=loopNodes[(i+1)%loopNodes.length];
    if(g.nodes[cur].block !== g.nodes[prev].block || g.nodes[cur].block !== g.nodes[next].block) boundaryCount++;
  }
  const mixedBonus=(histCount>0 && histCount<loopEdges.length)?18:0;

function findMainLoopInGraph(g){
  if(!g || !g.nodes || !g.edges || !g.nodes.length || !g.edges.length) return null;

  const starts=[];
  for(let i=0;i<g.nodes.length;i++) starts.push(i);
  starts.sort(function(a,b){ return info.nodeScore[b]-info.nodeScore[a]; });

  const maxDepth=Math.min(24, Math.max(8, Math.floor(g.nodes.length/2)));

  let expansions=0;

    const score=scoreLoop(g, info, loopNodes, loopEdges);

      best={nodes:loopNodes.slice(),edges:loopEdges.slice(),score:score,info:info};
    }
  }

    if(expansions > 12000 || pathNodes.length > maxDepth) return;
    expansions++;
    const outs=info.outEdges[current].slice();

      const pa=(a.lastDependency?30:0)+(a.historical?10:0)+info.nodeScore[a.to];
      const pb=(b.lastDependency?30:0)+(b.historical?10:0)+info.nodeScore[b.to];
      return pb-pa;
    });

      const edge=outs[i];

        consider(pathNodes, pathEdges.concat([edge]));
        continue;
      }
      if(visited[edge.to] || pathNodes.length >= maxDepth) continue;
      visited[edge.to]=true;
      pathNodes.push(edge.to);
      pathEdges.push(edge);
      dfs(start, edge.to, pathNodes, pathEdges, visited);

function deriveBridgeNodes(g, loop){
  if(!loop || !loop.nodes || !loop.nodes.length) return [];
  const info=loop.info || buildLoopGraphInfo(g);

  const target=Math.min(6, Math.max(3, Math.round(Math.sqrt(count))));

    const idx=loop.nodes[pos];
    const node=g.nodes[idx];
    const prev=loop.nodes[(pos-1+count)%count];
    const next=loop.nodes[(pos+1)%count];
    const boundary=(g.nodes[idx].block !== g.nodes[prev].block || g.nodes[idx].block !== g.nodes[next].block);

  }
  candidates.sort(function(a,b){ return b.score-a.score; });

    const cand=candidates[i];
    let tooClose=false;
    for(let j=0;j<picked.length;j++){
      if(circularDistance(cand.pos,picked[j].pos,count) <= minGap){ tooClose=true; break; }
    }
    if(!tooClose) picked.push(cand);
  }
  if(picked.length < 2){
    for(let i=0;i<candidates.length && picked.length<Math.min(target,candidates.length);i++){
      if(picked.indexOf(candidates[i]) < 0) picked.push(candidates[i]);
    }
  }
  picked.sort(function(a,b){ return a.pos-b.pos; });

}

  if(cy && cy.fit){cy.fit(undefined, 24);}
}
function setMode(mode){active=mode;document.getElementById('btnSame').classList.toggle('active',mode==='same');document.getElementById('btnHist').classList.toggle('active',mode==='historical');renderGraph(mode);}
document.getElementById('btnSame').addEventListener('click',()=>setMode('same'));
document.getElementById('btnHist').addEventListener('click',()=>setMode('historical'));
document.getElementById('layoutDir').addEventListener('change',()=>renderGraph(active));
document.getElementById('useHints').addEventListener('change',()=>renderGraph(active));
document.getElementById('ignoreParams').addEventListener('change',()=>renderGraph(active));
document.getElementById('ignoreAdjustable').addEventListener('change',()=>renderGraph(active));
document.getElementById('labelMode').addEventListener('change',()=>{applyLabelMode(); if(cy){cy.fit(undefined,24);}});
document.getElementById('toggleLegend').addEventListener('click',()=>{const lg=document.getElementById('legend');const hidden=lg.classList.toggle('hidden');document.getElementById('toggleLegend').textContent=hidden?'Show Legend':'Hide Legend';});
window.addEventListener('resize', function(){ if(cy){ cy.fit(undefined, 24); } });
setMode('same');
</script>
</body></html>
