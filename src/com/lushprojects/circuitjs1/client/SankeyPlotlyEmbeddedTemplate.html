<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sankey Diagram - __TITLE__</title>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: white; }
    #sankey-chart { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
  </style>
</head>
<body>
  <div id="sankey-chart"></div>
  <script>
    const data = __SANKEY_JSON__;

    const trace = {
      type: 'sankey',
      orientation: 'h',
      node: {
        pad: 15,
        thickness: 30,
        line: { color: 'black', width: 0.5 },
        label: data.nodeLabels,
        color: data.nodeColors,
        hovertemplate: '%{label}<extra></extra>'
      },
      link: {
        source: data.linkSources,
        target: data.linkTargets,
        value: data.linkValues,
        color: data.linkColors,
        customdata: data.linkLabels,
        hovertemplate: '%{customdata}<extra></extra>'
      }
    };

    if (__SHOW_ARROWS_BOOL__) {
      trace.link.arrowlen = 15;
    }

    const layout = {
      title: '',
      font: { size: 12 },
      margin: { l: 20, r: 20, t: 20, b: 20 }
    };

    const config = {
      responsive: true,
      displayModeBar: true,
      modeBarButtonsToRemove: ['lasso2d', 'select2d']
    };

    Plotly.newPlot('sankey-chart', [trace], layout, config);
  </script>
</body>
</html>
