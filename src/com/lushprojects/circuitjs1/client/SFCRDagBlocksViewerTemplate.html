<!doctype html>
<html><head><meta charset='utf-8'>
<title>SFCR DAG Blocks Plot</title>
<script src='https://cdn.jsdelivr.net/npm/cytoscape@3.29.2/dist/cytoscape.min.js'></script>
<script src='https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js'></script>
<script src='https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.min.js'></script>
<style>
body{font-family:sans-serif;margin:0;padding:12px;background:#fff;}
#controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px;}
button{padding:6px 10px;border:1px solid #ccc;background:#f8f8f8;cursor:pointer;}
button.active{background:#e8f0fe;border-color:#9bb6f0;}
#status{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:0 0 8px 0;}
.badge{display:inline-block;padding:2px 8px;border:1px solid #ccc;border-radius:999px;background:#fafafa;font-size:12px;color:#333;}
#legend{border:1px solid #ddd;border-radius:6px;padding:8px;background:#fafafa;margin:0 0 8px 0;}
#legend.hidden{display:none;}
.legendRow{display:flex;align-items:center;gap:8px;margin:4px 0;font-size:12px;}
.shapeKey{display:inline-flex;align-items:center;justify-content:center;width:12px;height:12px;border:1px solid #333;background:#fff;}
#dagPlot{width:100%;height:calc(100vh - 170px);min-height:420px;border:1px solid #eee;}
#nodeHoverTip{position:fixed;z-index:99999;max-width:560px;padding:8px 10px;background:#fff;border:1px solid #bbb;border-radius:6px;box-shadow:0 2px 8px rgba(0,0,0,0.15);font-size:12px;line-height:1.35;color:#222;white-space:normal;pointer-events:none;display:none;}
</style></head>
<body>
<div id='controls'>
<strong>Mode:</strong>
<button id='btnSame' class='active'>Same-Period</button>
<button id='btnHist'>Historical + Same-Period</button>
<label style='margin-left:8px;'>Direction:</label>
<select id='layoutDir'><option value='TB'>Top → Bottom</option><option value='LR' selected>Left → Right</option></select>
<label>Labels:</label>
<select id='labelMode'><option value='compact' selected>Compact</option><option value='full'>Full</option><option value='none'>None</option></select>
<label style='user-select:none;'><input id='useHints' type='checkbox'/> Use hint text for labels</label>
<label style='user-select:none;'><input id='ignoreParams' type='checkbox' checked/> Ignore # Parameters / # External sections</label>
<label style='user-select:none;'><input id='ignoreAdjustable' type='checkbox' checked/> Ignore adjustable rows</label>
<button id='toggleLegend'>Hide Legend</button>
</div>
<div id='status'>
<span id='modeBadge' class='badge'></span>
<span id='filterBadge' class='badge'></span>
<span class='badge'>Tip: click node to highlight neighborhood</span>
</div>
<div id='nodeHoverTip'></div>
<div id='legend'></div>
<div id='dagPlot'></div>
<script>
const sameData=__SAME_DATA_JSON__;
const historicalData=__HISTORICAL_DATA_JSON__;
const sameNoParamsData=__SAME_NO_PARAMS_DATA_JSON__;
const historicalNoParamsData=__HISTORICAL_NO_PARAMS_DATA_JSON__;
const sameNoAdjustableData=__SAME_NO_ADJUSTABLE_DATA_JSON__;
const historicalNoAdjustableData=__HISTORICAL_NO_ADJUSTABLE_DATA_JSON__;
const sameNoParamsNoAdjustableData=__SAME_NO_PARAMS_NO_ADJUSTABLE_DATA_JSON__;
const historicalNoParamsNoAdjustableData=__HISTORICAL_NO_PARAMS_NO_ADJUSTABLE_DATA_JSON__;
let active='same';
let cy=null;
let hoverTipEl=null;
function colorForBlock(block){const c=__BLOCK_COLORS_JS_ARRAY__;return c[(Math.max(1,block)-1)%c.length];}
function formatMathLabel(text){
  if(!text) return '';
  const greek = {
    alpha:'α',beta:'β',gamma:'γ',delta:'δ',epsilon:'ε',zeta:'ζ',eta:'η',theta:'θ',iota:'ι',kappa:'κ',lambda:'λ',mu:'μ',nu:'ν',xi:'ξ',omicron:'ο',pi:'π',rho:'ρ',sigma:'σ',tau:'τ',upsilon:'υ',phi:'φ',chi:'χ',psi:'ψ',omega:'ω',
    Alpha:'Α',Beta:'Β',Gamma:'Γ',Delta:'Δ',Epsilon:'Ε',Zeta:'Ζ',Eta:'Η',Theta:'Θ',Iota:'Ι',Kappa:'Κ',Lambda:'Λ',Mu:'Μ',Nu:'Ν',Xi:'Ξ',Omicron:'Ο',Pi:'Π',Rho:'Ρ',Sigma:'Σ',Tau:'Τ',Upsilon:'Υ',Phi:'Φ',Chi:'Χ',Psi:'Ψ',Omega:'Ω',
    degree:'°',pm:'±',times:'×',div:'÷',infty:'∞',sqrt:'√',approx:'≈',neq:'≠',leq:'≤',geq:'≥'
  };
  const subMap = {
    '0':'₀','1':'₁','2':'₂','3':'₃','4':'₄','5':'₅','6':'₆','7':'₇','8':'₈','9':'₉','+':'₊','-':'₋','=':'₌','(':'₍',')':'₎',
    'a':'ₐ','e':'ₑ','h':'ₕ','i':'ᵢ','j':'ⱼ','k':'ₖ','l':'ₗ','m':'ₘ','n':'ₙ','o':'ₒ','p':'ₚ','r':'ᵣ','s':'ₛ','t':'ₜ','u':'ᵤ','v':'ᵥ','x':'ₓ'
  };
  const supMap = {
    '0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹','+':'⁺','-':'⁻','=':'⁼','(':'⁽',')':'⁾',
    'a':'ᵃ','b':'ᵇ','c':'ᶜ','d':'ᵈ','e':'ᵉ','f':'ᶠ','g':'ᵍ','h':'ʰ','i':'ⁱ','j':'ʲ','k':'ᵏ','l':'ˡ','m':'ᵐ','n':'ⁿ','o':'ᵒ','p':'ᵖ','r':'ʳ','s':'ˢ','t':'ᵗ','u':'ᵘ','v':'ᵛ','w':'ʷ','x':'ˣ','y':'ʸ','z':'ᶻ'
  };
  let s = String(text).replace(/\\([A-Za-z]+)/g, function(_, key){ return Object.prototype.hasOwnProperty.call(greek, key) ? greek[key] : _; });
  function mapScriptWithFallback(value, map, marker, wasBraced){
    let out='';
    for(let i=0;i<value.length;i++){
      const ch=value.charAt(i);
      if(Object.prototype.hasOwnProperty.call(map, ch)) out += map[ch];
      else return marker + (wasBraced ? ('{' + value + '}') : value);
    }
    return out;
  }
  let out = '';
  for(let i=0;i<s.length;i++){
    const ch = s.charAt(i);
    if(ch !== '_' && ch !== '^'){ out += ch; continue; }
    const isSub = (ch === '_');
    if(i + 1 >= s.length){ out += ch; continue; }
    let script = '';
    let wasBraced = false;
    if(s.charAt(i + 1) === '{'){
      wasBraced = true;
      let j = i + 2;
      while(j < s.length && s.charAt(j) !== '}') j++;
      if(j < s.length){ script = s.substring(i + 2, j); i = j; }
      else { script = s.substring(i + 2); i = s.length - 1; }
    } else {
      script = s.charAt(i + 1);
      i = i + 1;
    }
    out += mapScriptWithFallback(script, isSub ? subMap : supMap, ch, wasBraced);
  }
  return out;
}
function compactLabel(s){if(!s) return ''; return s.length>22 ? s.substring(0,21)+'…' : s;}
function toElements(g){
  const elements=[];
  const useHints = !!(document.getElementById('useHints') && document.getElementById('useHints').checked);
  for(let i=0;i<g.nodes.length;i++){const n=g.nodes[i];const raw=(useHints && n.hint && String(n.hint).trim().length>0)?n.hint:n.name;const fmt=formatMathLabel(raw);const hintEq=formatMathLabel(n.hintEq||'');elements.push({data:{id:'n'+i,labelFull:fmt,labelDisplay:compactLabel(fmt),hintEq:hintEq,block:n.block,cyclical:n.cyclical?1:0,color:colorForBlock(n.block)}});}
  for(let i=0;i<g.edges.length;i++){const e=g.edges[i];const cyc=(g.nodes[e.from]&&g.nodes[e.from].block===g.nodes[e.to].block)?1:0;elements.push({data:{id:'e'+i,source:'n'+e.from,target:'n'+e.to,weight:cyc?1:3}});}
  return elements;
}
function getHoverTipEl(){
  if(!hoverTipEl){ hoverTipEl = document.getElementById('nodeHoverTip'); }
  return hoverTipEl;
}
function hideHoverTip(){
  const el = getHoverTipEl();
  if(!el) return;
  el.style.display = 'none';
}
function showHoverTip(evt, text){
  const el = getHoverTipEl();
  if(!el || !text) return;
  el.textContent = text;
  const oe = evt && evt.originalEvent ? evt.originalEvent : null;
  const x = oe && typeof oe.clientX === 'number' ? oe.clientX : 12;
  const y = oe && typeof oe.clientY === 'number' ? oe.clientY : 12;
  el.style.left = (x + 12) + 'px';
  el.style.top = (y + 12) + 'px';
  el.style.display = 'block';
}
function getActiveDataset(mode){
  const ignoreParams = !!document.getElementById('ignoreParams').checked;
  const ignoreAdjustable = !!document.getElementById('ignoreAdjustable').checked;
  if(mode==='historical'){
    if(ignoreParams && ignoreAdjustable) return historicalNoParamsNoAdjustableData;
    if(ignoreParams) return historicalNoParamsData;
    if(ignoreAdjustable) return historicalNoAdjustableData;
    return historicalData;
  }
  if(ignoreParams && ignoreAdjustable) return sameNoParamsNoAdjustableData;
  if(ignoreParams) return sameNoParamsData;
  if(ignoreAdjustable) return sameNoAdjustableData;
  return sameData;
}
function updateStatusBadges(){
  const modeText = (active==='historical') ? 'Mode: Historical + Same-Period' : 'Mode: Same-Period';
  const filters = [];
  if(document.getElementById('ignoreParams').checked) filters.push('Parameters/External Excluded');
  if(document.getElementById('ignoreAdjustable').checked) filters.push('Adjustable Rows Excluded');
  const filterText = filters.length ? ('Filter: ' + filters.join(' + ')) : 'Filter: None';
  document.getElementById('modeBadge').textContent = formatMathLabel(modeText);
  document.getElementById('filterBadge').textContent = formatMathLabel(filterText);
}
function buildLegend(){
  const legend = document.getElementById('legend');
  let html = '<div style="font-weight:600;margin-bottom:4px;">Legend</div>';
  html += '<div class="legendRow"><span class="shapeKey" style="border-radius:2px;"></span><span>Cyclical</span><span class="shapeKey" style="border-radius:6px;"></span><span>Non-cyclical</span></div>';
  legend.innerHTML = html;
}
function applyLabelMode(){
  if(!cy) return;
  const mode = document.getElementById('labelMode').value;
  cy.nodes().forEach(function(n){
    const full = n.data('labelFull') || '';
    let v = full;
    if(mode==='compact') v = compactLabel(full);
    if(mode==='none') v = '';
    n.data('labelDisplay', v);
  });
}
function clearHighlight(){
  if(!cy) return;
  cy.elements().removeClass('faded');
}
function enableNeighborhoodHighlight(){
  if(!cy) return;
  cy.on('mouseover', 'node', function(evt){
    const n = evt.target;
    const tip = (n && n.data) ? (n.data('hintEq') || '') : '';
    if(tip) showHoverTip(evt, tip);
    else hideHoverTip();
  });
  cy.on('mousemove', 'node', function(evt){
    const n = evt.target;
    const tip = (n && n.data) ? (n.data('hintEq') || '') : '';
    if(tip) showHoverTip(evt, tip);
  });
  cy.on('mouseout', 'node', function(){ hideHoverTip(); });
  cy.on('tap', 'node', function(evt){
    const n = evt.target;
    cy.elements().addClass('faded');
    const keep = n.closedNeighborhood();
    keep.removeClass('faded');
  });
  cy.on('tap', function(evt){ if(evt.target === cy){ clearHighlight(); } });
}
function renderGraph(mode){
  const g=getActiveDataset(mode);
  const title = g.title || 'SFCR DAG Blocks Plot';
  document.title = formatMathLabel(title);
  updateStatusBadges();
  buildLegend();
  if(typeof cytoscape === 'undefined'){
    document.getElementById('dagPlot').innerHTML='<div style="padding:12px;color:#b00;">Cytoscape failed to load.</div>';
    return;
  }
  if(cy){cy.destroy();cy=null;}
  hideHoverTip();
  cy = cytoscape({
    container: document.getElementById('dagPlot'),
    elements: toElements(g),
    style: [
      {selector:'node',style:{'label':'data(labelDisplay)','font-size':10,'text-wrap':'wrap','text-max-width':140,'text-valign':'center','text-halign':'center','width':'label','height':26,'padding-left':8,'padding-right':8,'background-color':'data(color)','border-width':1,'border-color':'#333','shape':'round-rectangle'}},
      {selector:'node[cyclical = 1]',style:{'shape':'rectangle','border-width':2}},
      {selector:'edge',style:{'curve-style':'bezier','width':1.2,'line-color':'#999','target-arrow-color':'#999','target-arrow-shape':'triangle','arrow-scale':0.9,'opacity':0.65}},
      {selector:'.faded',style:{'opacity':0.14}},
      {selector:':selected',style:{'overlay-opacity':0,'border-color':'#111','line-color':'#555','target-arrow-color':'#555'}}
    ],
    layout: {
      name:'dagre',
      rankDir:(document.getElementById('layoutDir') ? document.getElementById('layoutDir').value : 'LR'),
      rankSep:52,
      nodeSep:12,
      edgeSep:6,
      animate:false,
      acyclicer:'greedy',
      ranker:'network-simplex',
      edgeWeight:function(edge){ return edge.data('weight') || 1; }
    }
  });
  applyLabelMode();
  enableNeighborhoodHighlight();
  if(cy && cy.fit){cy.fit(undefined, 24);}
}
function setMode(mode){active=mode;document.getElementById('btnSame').classList.toggle('active',mode==='same');document.getElementById('btnHist').classList.toggle('active',mode==='historical');renderGraph(mode);}
document.getElementById('btnSame').addEventListener('click',()=>setMode('same'));
document.getElementById('btnHist').addEventListener('click',()=>setMode('historical'));
document.getElementById('layoutDir').addEventListener('change',()=>renderGraph(active));
document.getElementById('useHints').addEventListener('change',()=>renderGraph(active));
document.getElementById('ignoreParams').addEventListener('change',()=>renderGraph(active));
document.getElementById('ignoreAdjustable').addEventListener('change',()=>renderGraph(active));
document.getElementById('labelMode').addEventListener('change',()=>{applyLabelMode(); if(cy){cy.fit(undefined,24);}});
document.getElementById('toggleLegend').addEventListener('click',()=>{const lg=document.getElementById('legend');const hidden=lg.classList.toggle('hidden');document.getElementById('toggleLegend').textContent=hidden?'Show Legend':'Hide Legend';});
window.addEventListener('resize', function(){ if(cy){ cy.fit(undefined, 24); } });
setMode('same');
</script>
</body></html>
