407" x="267.1431" y="219.2231">(new government money created)</text></g><rect fill="#EEEEEE" height="3" style="stroke:#EEEEEE;stroke-width:1;" width="553.1611" x="0" y="252.8555"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="553.1611" y1="252.8555" y2="252.8555"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="553.1611" y1="255.8555" y2="255.8555"/><rect fill="#EEEEEE" height="23.1328" style="stroke:#000000;stroke-width:2;" width="247.7842" x="152.6885" y="242.2891"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="229.2583" x="158.6885" y="258.356">2. Production &amp; Wage Payment</text><g class="message" data-entity-1="part2" data-entity-2="part1" data-source-line="11" id="msg2"><polygon fill="#181818" points="60.6909,307.6875,50.6909,311.6875,60.6909,315.6875,56.6909,311.6875" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="54.6909" x2="249.1431" y1="311.6875" y2="311.6875"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="101.9307" x="66.6909" y="291.4888">Pays wages WB</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="88.4165" x="66.6909" y="306.6216">(WB = W * N)</text></g><rect fill="#EEEEEE" height="3" style="stroke:#EEEEEE;stroke-width:1;" width="553.1611" x="0" y="340.2539"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="553.1611" y1="340.2539" y2="340.2539"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="553.1611" y1="343.2539" y2="343.2539"/><rect fill="#EEEEEE" height="23.1328" style="stroke:#000000;stroke-width:2;" width="132.1934" x="210.4839" y="329.6875"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="113.6675" x="216.4839" y="345.7544">3. Tax Payment</text><g class="message" data-entity-1="part1" data-entity-2="part3" data-source-line="14" id="msg3"><polygon fill="#181818" points="485.3838,395.0859,495.3838,399.0859,485.3838,403.0859,489.3838,399.0859" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="49.6909" x2="491.3838" y1="399.0859" y2="399.0859"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="82.0054" x="56.6909" y="378.8872">Pays taxes T</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="81.7324" x="56.6909" y="394.02">(T = &#952; * WB)</text></g><path d="M54,412.0859 L54,452.0859 L202,452.0859 L202,422.0859 L192,412.0859 L54,412.0859" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M192,412.0859 L192,422.0859 L202,422.0859 L192,412.0859" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="127.3276" x="60" y="429.1528">Disposable income:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="79.7773" x="60" y="444.2856">YD = WB - T</text><rect fill="#EEEEEE" height="3" style="stroke:#EEEEEE;stroke-width:1;" width="553.1611" x="0" y="477.918"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="553.1611" y1="477.918" y2="477.918"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="553.1611" y1="480.918" y2="480.918"/><rect fill="#EEEEEE" height="23.1328" style="stroke:#000000;stroke-width:2;" width="133.4629" x="209.8491" y="467.3516"/><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="114.937" x="215.8491" y="483.4185">4. Consumption</text><g class="message" data-entity-1="part1" data-entity-2="part2" data-source-line="22" id="msg4"><polygon fill="#181818" points="238.1431,532.75,248.1431,536.75,238.1431,540.75,242.1431,536.75" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="49.6909" x2="2