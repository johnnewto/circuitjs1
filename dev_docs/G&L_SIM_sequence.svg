x1="49.6909" x2="491.3838" y1="689.5469" y2="689.5469"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="83.0654" x="56.6909" y="669.3481">&#916;H&#688; = YD - C</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="253.1064" x="56.6909" y="684.481">(change in household money holdings)</text></g><g class="message" data-entity-1="part3" data-entity-2="part1" data-source-line="33" id="msg6"><polygon fill="#181818" points="60.6909,729.8125,50.6909,733.8125,60.6909,737.8125,56.6909,733.8125" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="54.6909" x2="496.3838" y1="733.8125" y2="733.8125"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="73.6455" x="66.6909" y="713.6138">&#916;H&#738; = G - T</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="169.603" x="66.6909" y="728.7466">(change in money supply)</text></g><path d="M5,746.8125 L5,801.8125 L542,801.8125 L542,756.8125 L532,746.8125 L5,746.8125" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M532,746.8125 L532,756.8125 L542,756.8125 L532,746.8125" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="216.8677" x="160.6467" y="763.8794">Stock-flow consistency condition:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="66.5996" x="160.6467" y="779.0122">&#916;H&#688; &#8801; &#916;H&#738;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="116.2256" x="160.6467" y="794.145">(hidden equation)</text><rect fill="#EEEEEE" height="3" style="stroke:#EEEEEE;stroke-width:1;" width="553.1611" x="0" y="827.7773"/><line style="stroke:#000000;stroke-width:1;" x1="0" x2="553.1611" y1="82